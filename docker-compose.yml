# ==================== EduManus 教学智能体协作系统 - Docker Compose ====================
# 基于 MoocManus 定制的教学领域多智能体协作系统部署配置

services:
  # ==================== 基础设施 ====================

  edumanus-redis:
    image: redis:7-alpine
    container_name: edumanus-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - edumanus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  edumanus-postgres:
    image: postgres:16-alpine
    container_name: edumanus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-edumanus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edumanus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-edumanus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 沙箱服务（教学代码执行环境） ====================

  edumanus-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: edumanus-sandbox
    container_name: edumanus-sandbox
    restart: "no"
    networks:
      - edumanus-network

  # ==================== 后端 API（教学智能体服务） ====================

  edumanus-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: edumanus-api
    restart: unless-stopped
    env_file:
      - .env
    # 如需动态创建沙箱容器，取消以下注释以挂载 Docker Socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      edumanus-redis:
        condition: service_healthy
      edumanus-postgres:
        condition: service_healthy
    networks:
      - edumanus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/status"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  # ==================== 前端 UI（教学化界面） ====================

  edumanus-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: edumanus-ui
    restart: unless-stopped
    depends_on:
      edumanus-api:
        condition: service_healthy
    networks:
      - edumanus-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== Nginx 网关 ====================

  edumanus-nginx:
    image: nginx:alpine
    container_name: edumanus-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8088}:80"
      # 如需启用 HTTPS，取消以下注释
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL 证书挂载（如需启用 HTTPS，取消以下注释）
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      edumanus-ui:
        condition: service_healthy
      edumanus-api:
        condition: service_healthy
    networks:
      - edumanus-network

# ==================== 数据卷 ====================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local

# ==================== 网络 ====================
networks:
  edumanus-network:
    name: edumanus-network
    driver: bridge